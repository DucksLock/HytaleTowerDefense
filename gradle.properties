org.gradle.daemon=true
org.gradle.parallel=true
# OneDrive file sync can desync Gradle's file watcher/incremental state.
# Keep this off here to avoid intermittent "cannot find symbol" on local sources.
org.gradle.vfs.watch=false
# Turn the following on once you finished changing your settings/build:
org.gradle.configuration-cache=true
org.gradle.caching=true

# Optional Hytale location for the Assets.zip resolution:
# hytale.home_path=...
